<script>
  (function() {
    const modeKey = 'mode';
    const lightMode = 'light';

    try {
      // Only set default if user has no preference stored
      if (!localStorage.getItem(modeKey)) {
        localStorage.setItem(modeKey, lightMode);
        document.documentElement.setAttribute('data-mode', lightMode);
      }
    } catch (e) {
      // If storage is unavailable, fall back to light via attribute only
      document.documentElement.setAttribute('data-mode', lightMode);
    }

    // Remove Google Fonts link to prevent display:swap FOUT (fonts are self-hosted)
    new MutationObserver(function(mutations, obs) {
      var link = document.querySelector('link[href*="fonts.googleapis.com"]');
      if (link) { link.remove(); obs.disconnect(); }
    }).observe(document.head, { childList: true });
  })();
</script>

<link rel="icon" href="{{ '/assets/img/favicons/favicon.ico' | relative_url }}?v={{ site.kb_build_id }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/img/favicons/favicon-32x32.png' | relative_url }}?v={{ site.kb_build_id }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/img/favicons/favicon-16x16.png' | relative_url }}?v={{ site.kb_build_id }}">

<style>
  a[href^="/categories/"] { pointer-events: none; cursor: default; color: inherit !important; text-decoration: none !important; }
  /* Hide folder icon + category labels on home page cards, post pages, and search results */
  .post-meta i.far.fa-folder-open,
  .post-meta .categories,
  .post-meta .me-sm-4:has(i.fa-folder) { display: none; }
  .post-tail-wrapper .post-meta:has(i.fa-folder-open) { display: none; }
  /* Remove post-tail double border and reduce gap; hide Chirpy attribution line */
  .post-tail-wrapper { border-bottom: none !important; margin-top: 2rem !important; }
  #tail-wrapper footer p:last-child { display: none !important; }
  #sidebar #avatar img { width: 100%; height: 100%; transform: translateY(6px) !important; }
  #sidebar #avatar img:hover { transform: translateY(6px) scale(1.2) !important; }
  /* Mobile topbar: hide site title */
  @media (max-width: 849px) {
    #topbar-title { display: none; }
  }
</style>

{% if page.url == '/about/' %}
<style>
  article .content p { font-size: 1.1rem; }
</style>
{% endif %}

{% if page.layout == 'post' %}
<style>
  .prose figure { text-align: center; }
  /* Hide heading anchor links */
  h1 > a[href^="#"], h2 > a[href^="#"], h3 > a[href^="#"],
  h4 > a[href^="#"], h5 > a[href^="#"], h6 > a[href^="#"],
  .anchor-link { display: none !important; }
</style>
{% endif %}
